<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flori Numerologie</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --deep: #0a0612;
    --purple-mid: #1e1035;
    --text: #e8dfc8;
    --text-dim: #9a8fa0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(60,20,100,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(30,10,70,0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(80,30,20,0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
    50% { opacity: var(--max-op, 0.8); transform: scale(1.3); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    padding: 60px 24px 80px;
    text-align: center;
  }

  .eye-symbol {
    font-size: 56px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px var(--gold));
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 20px var(--gold)); }
    50% { filter: drop-shadow(0 0 40px var(--gold-light)); }
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.3;
    text-shadow: 0 0 40px rgba(201,168,76,0.5);
    margin-bottom: 8px;
  }

  .subtitle {
    font-style: italic;
    color: var(--text-dim);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
    margin-bottom: 40px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  .divider-icon { color: var(--gold); font-size: 1rem; }

  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 8px;
  }

  .link-btn {
    display: block;
    text-decoration: none;
    background: linear-gradient(135deg, rgba(30,16,53,0.9) 0%, rgba(17,8,32,0.95) 100%);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 4px;
    padding: 22px 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    cursor: pointer;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
  }

  .link-btn:hover, .link-btn:active {
    border-color: rgba(201,168,76,0.7);
    box-shadow: 0 0 30px rgba(201,168,76,0.15);
    transform: translateY(-2px);
  }

  .link-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 10px var(--gold));
  }

  .link-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.95rem;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .link-desc {
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  footer {
    margin-top: 50px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <span class="eye-symbol">🔮</span>
  <h1>Flori Numerologie</h1>
  <p class="subtitle">Descoperă mesajul numerelor tale</p>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <div class="links">

    <a class="link-btn" href="https://florinumerologie.github.io/Calendar-numerologie/index.html">
      <span class="link-icon">🌟</span>
      <div class="link-title">Calculator Numerologic</div>
      <div class="link-desc">Află numărul destinului, al numelui și matricea ta</div>
    </a>

    <a class="link-btn" href="https://florinumerologie.github.io/Calendar-numerologie/ghid-numerologie.html">
      <span class="link-icon">✨</span>
      <div class="link-title">Ghid Cifra Conștiinței</div>
      <div class="link-desc">Descoperă ce spune cifra 1-9 despre sufletul tău</div>
    </a>

  </div>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <footer>✦ Numerele nu mint ✦</footer>
</div>

<script>
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --d: ${Math.random() * 4 + 2}s;
      --delay: ${Math.random() * 4}s;
      --min-op: ${Math.random() * 0.2 + 0.1};
      --max-op: ${Math.random() * 0.5 + 0.4};
    `;
    starsContainer.appendChild(star);
  }
</script>
</body>
</html>
